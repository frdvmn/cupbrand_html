<section class="map">
  <div class="container">
    <div class="map__container">
      <div class="map__inline">
        <h2 class="map__title">Наши точки</h2>
        <div class="filter-container">
          <span class="filter-label">Город:</span>
          <select class="city-select" id="citySelect">
              <option value="">Все города</option>
          </select>
        </div>
      </div>
      <div id="map" style="width: 100%; height: 400px"></div>
      <!-- Модалка -->
      <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-content">
                <h2 class="modal-city" id="modalCity"></h2>
                <div class="modal-location" id="modalLocation"></div>
                <p class="modal-description" id="modalDescription"></p>

                <!-- Список всех точек города -->
                <div class="locations-list" id="locationsList"></div>
            </div>
        </div>
    </div>

    </div>
  </div>
</section>
